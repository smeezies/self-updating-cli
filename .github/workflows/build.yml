stages:
  - build
  - release

variables:
  APP_NAME: "myapp"
  VERSION: "${CI_COMMIT_TAG}"

build:binaries:
  stage: build
  image: golang:1.22-alpine
  before_script:
    - apk add --no-cache zip
  script:
    - |
      for TARGET in \
        "linux   amd64  ${APP_NAME}-linux-amd64" \
        "linux   arm64  ${APP_NAME}-linux-arm64" \
        "darwin  amd64  ${APP_NAME}-darwin-amd64" \
        "darwin  arm64  ${APP_NAME}-darwin-arm64" \
        "windows amd64  ${APP_NAME}-windows-amd64.exe"; do
        GOOS=$(echo $TARGET | awk '{print $1}')
        GOARCH=$(echo $TARGET | awk '{print $2}')
        OUT=$(echo $TARGET | awk '{print $3}')
        GOOS=$GOOS GOARCH=$GOARCH go build \
          -ldflags="-s -w -X main.version=${VERSION}" \
          -o "dist/${OUT}" \
          ./cmd/app
      done
    - cd dist && sha256sum * > SHA256SUMS
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  rules:
    - if: '$CI_COMMIT_TAG'   # only build on version tags like v1.2.3

release:github:
  stage: release
  image: alpine:3.19
  needs:
    - build:binaries
  before_script:
    - apk add --no-cache github-cli
  script:
    - |
      gh release create "${CI_COMMIT_TAG}" dist/* \
        --repo "${GITHUB_REPO}" \
        --title "${CI_COMMIT_TAG}" \
        --notes "Release ${CI_COMMIT_TAG}" \
        --verify-tag
  rules:
    - if: '$CI_COMMIT_TAG'