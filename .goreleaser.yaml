# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: self-updating-cli
    main: ./cmd/app
    binary: self-updating-cli
    ldflags:
      - -s -w
      - -X github.com/smeezies/self-updating-cli/internal/version.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: self-updating-cli
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request